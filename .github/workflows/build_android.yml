name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Android SDK + Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: android-sdk-v1-${{ runner.os }}-${{ hashFiles('kyotei_android/buildozer.spec') }}
          restore-keys: |
            android-sdk-v1-${{ runner.os }}-

      - name: Build APK (kivy/buildozer Docker)
        run: |
          mkdir -p $HOME/.buildozer
          yes 2>/dev/null | docker run --rm -i \
            -v ${{ github.workspace }}/kyotei_android:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug 2>&1 | tee build.log
          DOCKER_EXIT=${PIPESTATUS[1]}
          echo "Docker exit code: $DOCKER_EXIT"
          exit $DOCKER_EXIT

      - name: Find APK
        id: apk
        run: |
          APK=$(find kyotei_android/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            ls -la kyotei_android/bin/ 2>/dev/null || echo "bin/ not found"
            grep -i "error\|failed\|exception" build.log | tail -30 || true
            exit 1
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyotei-start-analysis-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "6艇スタート分析 v1.0.${{ github.run_number }}"
          body: |
            ## 6艇スタート分析 Android版

            ### インストール方法
            1. APKファイルをスマホでダウンロード
            2. Androidの設定で「提供元不明のアプリ」を許可
            3. ダウンロードしたAPKをタップしてインストール

            ※ Android 8.0 (API 26) 以上が必要です
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
